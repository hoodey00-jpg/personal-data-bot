name: Daily Summary

on:
  schedule:
    - cron: '59 16 * * *'  # 16:59 UTC = 23:59 ICT (UTC+7)
  workflow_dispatch:         # trigger manual ได้จาก GitHub UI

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/daily
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            ${{ secrets.RAILWAY_URL }}/cron/daily
